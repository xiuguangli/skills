interface:
  display_name: "Research Papers"
  short_description: "先全量扫六大会再补 arXiv、每 topic 保留 50 篇的深度综述"
  default_prompt: "Use $research-papers 围绕我的研究主题生成中文论文综述：先根据用户输入在运行时分析出 aliases、subtopics、keywords，再用这些参数全量检索六大会 venue 并补 arXiv；每个 topic 至少保留 50 篇论文并保证候选池过百，先写 topic 解读，再逐篇解读、给图和例子，最后输出整体理解与重要点。"
